services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-doublecheck}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    # After first start, pull a model once:
    #   docker compose exec ollama ollama pull llama3.2

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-doublecheck};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__Key: ${JWT_KEY:-CHANGE_ME_dev-only-secret-key-min-32-characters-long!!}
      Jwt__Issuer: ${JWT_ISSUER:-DoubleCheck}
      Jwt__Audience: ${JWT_AUDIENCE:-DoubleCheckClients}
      Ai__Provider: ${AI_PROVIDER:-Ollama}
      Ai__OllamaUrl: "http://ollama:11434"
      Ai__Model: ${AI_MODEL:-llama3.2}
    ports:
      - "8080:8080"

volumes:
  pgdata:
  ollama:
